<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איך לפתוח את שיעורי הטניס</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 1rem; line-height: 1.6; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    a.btn { display: inline-block; padding: 0.65rem 1.2rem; background: #8fb996; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
    code { background: #eee; padding: 0.15rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>שיעורי טניס — איך לפתוח</h1>
  <div class="card">
    <h2>בלי שרת</h2>
    <p>לחיצה כפולה על <code>run.html</code> באותה תיקייה כמו הפרויקט.</p>
  </div>
  <div class="card">
    <h2>האפליקציה המלאה</h2>
    <p>בטרמינל בתיקיית הפרויקט: <code>npm.cmd run dev</code> ואז:</p>
    <p><a class="btn" href="http://localhost:3000" target="_blank">פתח localhost:3000</a></p>
  </div>
</body>
</html>
